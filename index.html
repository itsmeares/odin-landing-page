<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Landing Page Project</title>
        <link rel="stylesheet" href="styles.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    </head>

    <body>
        <div class="header">
            <div class="header__logo">
                Header Logo
            </div>

            <div class="header__links">
                <ul>
                    <li><a href="#">header link one</a></li>
                    <li><a href="#">header link two</a></li>
                    <li><a href="#">header link three</a></li>
                </ul>
            </div>
        </div>

        <div class="hero">
            <div class="hero__left">
                <div class="hero__main">This website is awesome</div>

                <div class="hero__secondary">This website has some subtext that goes here under the main title. It's a smaller font and the color is lower contrast</div>

                <button class="hero__button">Sign up</button>
            </div>


            <img class="hero__image" src="images/aurora.jpg" alt="Snow mountain with Aurora borealis">
        </div>
    </body>
</html>
